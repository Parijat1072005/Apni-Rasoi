# /etc/nginx/sites-available/apni-rasoi

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;

    # Customer frontend → /var/www/apni-rasoi/client/dist
    root /var/www/apni-rasoi/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin dashboard → /admin subdomain or /admin path
    location /admin-panel/ {
        alias /var/www/apni-rasoi/admin/dist/;
        try_files $uri $uri/ /var/www/apni-rasoi/admin/dist/index.html;
    }

    # API → Express server on port 5000
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Static assets long cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2|woff|css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}