name: CI — Apni Rasoi

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build server
        run: |
          cd server
          npm ci

      - name: Install & build client
        run: |
          cd client
          npm ci
          npm run build

      - name: Install & build admin
        run: |
          cd admin
          npm ci
          npm run build

      - name: Confirm builds exist
        run: |
          ls client/dist
          ls admin/dist
          echo "✅ All builds successful"