name: Deploy — Apni Rasoi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /var/www/apni-rasoi

            echo "📦 Pulling latest code..."
            git stash
            git pull origin main
            git stash drop 2>/dev/null || true

            echo "🔧 Writing env files..."
            echo "VITE_API_URL=https://apnirasoiachaar.com/api" > client/.env.production
            echo "VITE_API_URL=https://apnirasoiachaar.com/api" > admin/.env.production

            echo "📦 Installing server deps..."
            cd server && npm install --omit=dev && cd ..

            echo "🏗️  Building client..."
            cd client && npm install && npm run build && cd ..

            echo "🏗️  Building admin..."
            cd admin && npm install && npm run build && cd ..

            echo "♻️  Restarting server with PM2..."
            pm2 reload ecosystem.config.cjs --env production

            echo "🔄 Reloading Nginx..."
            sudo systemctl reload nginx

            echo "✅ Deployment complete!"

      - name: Notify success
        if: success()
        run: echo "🚀 Deployed to production successfully!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed — check the logs"